<!DOCTYPE html>
<html>
<head>
    <title>ICCT Student Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #e9edf3;
            min-height: 100vh;
        }

        .login-body {
            background: linear-gradient(135deg, #1f3c88, #6c757d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #1f3c88;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .logo-large {
            width: 100px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .link {
            margin-top: 15px;
            color: #1f3c88;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
        }

        #message {
            margin-top: 10px;
            font-size: 14px;
            min-height: 20px;
        }

        .dashboard-body {
            padding: 0;
        }

        .header {
            position: relative;
            background-color: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            margin: 10px 0;
            max-width: 60%;
            line-height: 1.3;
        }

        .logo {
            position: absolute;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .top-buttons {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }

        .logout-btn,
        .delete-account-btn {
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .logout-btn {
            background-color: #64748b;
        }

        .delete-account-btn {
            background-color: #dc3545;
        }

        .logout-btn:hover {
            background-color: #475569;
        }

        .delete-account-btn:hover {
            background-color: #b02a37;
        }

        h2 {
            text-align: center;
            margin: 30px 0 20px;
            color: #333;
            font-size: 24px;
        }

        .search-box {
            text-align: center;
            margin-bottom: 25px;
            padding: 0 20px;
        }

        .search-box input {
            padding: 10px;
            width: 300px;
            max-width: 100%;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .search-box button {
            padding: 10px 20px;
            margin-left: 10px;
            background: #1f3c88;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .table-container {
            width: 90%;
            max-width: 1000px;
            margin: 0 auto 40px auto;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        thead {
            background: #1f3c88;
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            font-weight: bold;
            font-size: 14px;
        }

        td {
            font-size: 14px;
        }

        tbody tr:nth-child(even) {
            background: #f8f9fa;
        }

        tbody tr:hover {
            background: #e9ecef;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin: 0 3px;
            font-weight: bold;
            font-size: 13px;
            color: white;
        }

        .edit-btn {
            background: #1f3c88;
        }

        .delete-btn {
            background: #dc3545;
        }

        .view-only {
            color: #6c757d;
            font-size: 12px;
            font-style: italic;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 20px;
        }

        .modal-content p {
            margin-bottom: 20px;
            color: #666;
            line-height: 1.5;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .modal-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #1f3c88;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .cancel-btn {
            background: #6c757d !important;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .header {
                padding: 80px 20px 20px 20px;
                min-height: auto;
            }
            
            .header h1 {
                font-size: 20px;
                max-width: 100%;
                margin-top: 10px;
            }
            
            .logo {
                position: static;
                transform: none;
                width: 60px;
                height: 60px;
                margin-top: 10px;
            }
            
            .top-buttons {
                top: 15px;
                left: 50%;
                transform: translateX(-50%);
                width: 100%;
                justify-content: center;
            }

            .search-box input {
                width: 100%;
                margin-bottom: 10px;
            }

            .search-box button {
                width: 100%;
                margin-left: 0;
            }

            .table-container {
                width: 95%;
            }

            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }

            .action-btn {
                padding: 5px 8px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<div id="authSection" class="login-body">
    <div class="login-container">
        <img src="logo.png" class="logo-large" alt="Logo">
        <h2>ICCT Student Portal</h2>

        <div id="loginSection">
            <input type="text" id="loginId" placeholder="Student ID">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Login</button>
            <p class="link" onclick="showSignup()">No account? Sign up here</p>
        </div>

        <div id="signupSection" style="display:none;">
            <input type="text" id="signupId" placeholder="Student ID">
            <input type="text" id="signupName" placeholder="Full Name">
            <input type="text" id="signupCourse" placeholder="Course">
            <input type="number" id="signupYear" placeholder="Year Level">
            <input type="number" id="signupAge" placeholder="Age">
            <input type="password" id="signupPassword" placeholder="Create Password">
            <button onclick="signup()">Create Account</button>
            <p class="link" onclick="showLogin()">Already have account? Login</p>
        </div>

        <p id="message"></p>
    </div>
</div>

<div id="dashboardSection" class="hidden">
    <div class="header">
        <div class="top-buttons">
            <button class="delete-account-btn" onclick="openDeleteModal()">Delete My Account</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <h1>Student Information Management System</h1>
        <img src="logo.png" class="logo" alt="Logo">
    </div>

    <h2>Student List</h2>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Student ID or Name">
        <button onclick="searchStudent()">Search</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Year</th>
                    <th>Age</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Edit My Information</h3>
        <input type="text" id="editId" placeholder="Student ID">
        <input type="text" id="editName" placeholder="Full Name">
        <input type="text" id="editCourse" placeholder="Course">
        <input type="number" id="editYear" placeholder="Year Level">
        <input type="number" id="editAge" placeholder="Age">
        <div class="modal-buttons">
            <button onclick="saveEdit()">Save</button>
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h3>Delete Account</h3>
        <p>Are you sure you want to delete your account? This action cannot be undone.</p>
        <div class="modal-buttons">
            <button onclick="confirmDelete()">Yes, Delete</button>
            <button class="cancel-btn" onclick="closeDeleteModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let currentUserId = null;

    window.onload = function() {
        if(localStorage.getItem("loggedIn") === "true") {
            currentUserId = localStorage.getItem("currentUserId");
            showDashboard();
        } else {
            showAuth();
        }
    };

    function showSignup() {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("signupSection").style.display = "block";
        document.getElementById("message").innerText = "";
    }

    function showLogin() {
        document.getElementById("signupSection").style.display = "none";
        document.getElementById("loginSection").style.display = "block";
        document.getElementById("message").innerText = "";
    }

    function signup() {
        let id = document.getElementById("signupId").value.trim();
        let name = document.getElementById("signupName").value.trim();
        let course = document.getElementById("signupCourse").value.trim();
        let year = document.getElementById("signupYear").value.trim();
        let age = document.getElementById("signupAge").value.trim();
        let password = document.getElementById("signupPassword").value.trim();

        if(id === "" || name === "" || course === "" || year === "" || age === "" || password === "") {
            document.getElementById("message").innerText = "Fill in all fields!";
            document.getElementById("message").style.color = "#dc3545";
            return;
        }

        let students = JSON.parse(localStorage.getItem("students")) || [];
        if(students.find(s => s.id === id)) {
            document.getElementById("message").innerText = "Student ID already exists!";
            document.getElementById("message").style.color = "#dc3545";
            return;
        }

        let student = { id, name, course, year, age, password };
        localStorage.setItem("studentAccount", JSON.stringify(student));
        students.push({ id, name, course, year, age });
        localStorage.setItem("students", JSON.stringify(students));

        document.getElementById("message").style.color = "green";
        document.getElementById("message").innerText = "Account created successfully!";
        setTimeout(showLogin, 1500);
    }

    function login() {
        let loginId = document.getElementById("loginId").value.trim();
        let loginPassword = document.getElementById("loginPassword").value.trim();
        let stored = JSON.parse(localStorage.getItem("studentAccount"));

        if(stored && loginId === stored.id && loginPassword === stored.password) {
            localStorage.setItem("loggedIn", "true");
            localStorage.setItem("currentUserId", loginId);
            currentUserId = loginId;
            showDashboard();
        } else {
            document.getElementById("message").style.color = "#dc3545";
            document.getElementById("message").innerText = "Invalid Student ID or Password!";
        }
    }

    function logout() {
        localStorage.removeItem("loggedIn");
        localStorage.removeItem("currentUserId");
        currentUserId = null;
        showAuth();
    }

    function showAuth() {
        document.getElementById("authSection").classList.remove("hidden");
        document.getElementById("dashboardSection").classList.add("hidden");
        document.body.className = "";
        document.getElementById("loginId").value = "";
        document.getElementById("loginPassword").value = "";
        document.getElementById("message").innerText = "";
    }

    function showDashboard() {
        document.getElementById("authSection").classList.add("hidden");
        document.getElementById("dashboardSection").classList.remove("hidden");
        document.body.className = "dashboard-body";
        renderTable();
    }

    function renderTable() {
        let students = JSON.parse(localStorage.getItem("students")) || [];
        let tbody = document.getElementById("studentTable");
        tbody.innerHTML = "";

        students.forEach((student) => {
            let row = tbody.insertRow();
            let isCurrentUser = student.id === currentUserId;
            
            let actions = isCurrentUser 
                ? `<button class="action-btn edit-btn" onclick="openEditModal()">Edit</button>
                   <button class="action-btn delete-btn" onclick="openDeleteModal()">Delete</button>`
                : `<span class="view-only">View Only</span>`;
            
            row.innerHTML = `
                <td>${student.id}</td>
                <td>${student.name}</td>
                <td>${student.course}</td>
                <td>${student.year}</td>
                <td>${student.age}</td>
                <td>${actions}</td>
            `;
        });
    }

    function searchStudent() {
        let query = document.getElementById("searchInput").value.toLowerCase();
        let students = JSON.parse(localStorage.getItem("students")) || [];
        let tbody = document.getElementById("studentTable");
        tbody.innerHTML = "";

        students.forEach((student) => {
            if(student.id.toLowerCase().includes(query) || student.name.toLowerCase().includes(query)) {
                let row = tbody.insertRow();
                let isCurrentUser = student.id === currentUserId;
                
                let actions = isCurrentUser 
                    ? `<button class="action-btn edit-btn" onclick="openEditModal()">Edit</button>
                       <button class="action-btn delete-btn" onclick="openDeleteModal()">Delete</button>`
                    : `<span class="view-only">View Only</span>`;
                
                row.innerHTML = `
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.course}</td>
                    <td>${student.year}</td>
                    <td>${student.age}</td>
                    <td>${actions}</td>
                `;
            }
        });
    }

    function openEditModal() {
        let students = JSON.parse(localStorage.getItem("students")) || [];
        let student = students.find(s => s.id === currentUserId);

        if(student) {
            document.getElementById("editId").value = student.id;
            document.getElementById("editName").value = student.name;
            document.getElementById("editCourse").value = student.course;
            document.getElementById("editYear").value = student.year;
            document.getElementById("editAge").value = student.age;
            document.getElementById("editModal").style.display = "flex";
        }
    }

    function closeModal() {
        document.getElementById("editModal").style.display = "none";
    }

    function saveEdit() {
        let students = JSON.parse(localStorage.getItem("students")) || [];
        let account = JSON.parse(localStorage.getItem("studentAccount")) || {};
        
        let newId = document.getElementById("editId").value.trim();
        let oldId = currentUserId;
        
        if(newId === "") {
            alert("Student ID cannot be empty!");
            return;
        }
        
        if(newId !== oldId) {
            let existingStudent = students.find(s => s.id === newId);
            if(existingStudent) {
                alert("Student ID already exists! Please choose a different one.");
                return;
            }
        }
        
        let studentIndex = students.findIndex(s => s.id === oldId);
        
        if(studentIndex !== -1) {
            students[studentIndex] = {
                id: newId,
                name: document.getElementById("editName").value,
                course: document.getElementById("editCourse").value,
                year: document.getElementById("editYear").value,
                age: document.getElementById("editAge").value
            };
            
            account.id = newId;
            account.name = document.getElementById("editName").value;
            account.course = document.getElementById("editCourse").value;
            account.year = document.getElementById("editYear").value;
            account.age = document.getElementById("editAge").value;
            
            localStorage.setItem("students", JSON.stringify(students));
            localStorage.setItem("studentAccount", JSON.stringify(account));
            
            currentUserId = newId;
            localStorage.setItem("currentUserId", newId);
            
            renderTable();
            closeModal();
        }
    }

    function openDeleteModal() {
        document.getElementById("deleteModal").style.display = "flex";
    }

    function closeDeleteModal() {
        document.getElementById("deleteModal").style.display = "none";
    }

    function confirmDelete() {
        let students = JSON.parse(localStorage.getItem("students")) || [];
        students = students.filter(s => s.id !== currentUserId);
        
        localStorage.setItem("students", JSON.stringify(students));
        localStorage.removeItem("studentAccount");
        localStorage.removeItem("loggedIn");
        localStorage.removeItem("currentUserId");
        currentUserId = null;
        
        closeDeleteModal();
        showAuth();
        document.getElementById("message").style.color = "green";
        document.getElementById("message").innerText = "Account deleted successfully";
    }

    window.onclick = function(event) {
        if(event.target.classList.contains("modal")) {
            event.target.style.display = "none";
        }
    }
</script>

</body>
</html>
